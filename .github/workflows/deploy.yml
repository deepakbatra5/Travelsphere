name: Travelsphere EKS CI/CD

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: travelsphere-cluster
  APP_REPOSITORY: travelsphere-app
  MIGRATION_REPOSITORY: travelsphere-migration

jobs:
  build-and-push:
    name: Build & Push Containers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account and ECR registry
        id: awsmeta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "ecr_registry=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ─── Build & Push Migration Image (Builder Stage Target) ─────
      - name: Build and Push Migration Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          push: true
          tags: |
            ${{ steps.awsmeta.outputs.ecr_registry }}/${{ env.MIGRATION_REPOSITORY }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.awsmeta.outputs.ecr_registry }}/${{ env.MIGRATION_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Build & Push Standalone Application Image ───────────────
      - name: Build and Push Production App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.awsmeta.outputs.ecr_registry }}/${{ env.APP_REPOSITORY }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.awsmeta.outputs.ecr_registry }}/${{ env.APP_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account and ECR registry
        id: awsmeta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "ecr_registry=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.2'

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Apply Namespace & ConfigMaps
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

      # Only deploy secrets template if it doesn't already exist.
      # This prevents overwriting live database passwords and API keys on subsequent runs.
      - name: Apply Default Secrets (If Not Exist)
        run: |
          if ! kubectl get secret travelsphere-secrets -n travelsphere >/dev/null 2>&1; then
            kubectl apply -f k8s/secrets.yaml
            echo "Secrets template applied. PLEASE UPDATE SECRET VALUES IN KUBERNETES BEFORE CONTINUING."
          else
            echo "Secrets already exist. Skipping template application."
          fi

      # ─── Run Database Migrations Job ─────────────────────────────
      - name: Execute Prisma Migrations Job
        run: |
          # Replace the placeholder image with the ECR image that was just pushed
          sed -i "s|travelsphere-migration:latest|${{ steps.awsmeta.outputs.ecr_registry }}/${{ env.MIGRATION_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}|g" k8s/db-migration-job.yaml
          
          # Delete any previous job execution to ensure this one runs
          kubectl delete job db-migration -n travelsphere --ignore-not-found=true
          
          # Apply the database migration job
          kubectl apply -f k8s/db-migration-job.yaml
          
          # Wait up to 5 minutes for migrations & seeding to complete successfully
          kubectl wait --for=condition=complete --timeout=300s job/db-migration -n travelsphere

      # ─── Deploy Database & Application ───────────────────────────
      - name: Deploy Services
        run: |
          # Replace the placeholder image with the production ECR image
          sed -i "s|travelsphere-app:latest|${{ steps.awsmeta.outputs.ecr_registry }}/${{ env.APP_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}|g" k8s/app-deployment.yaml
          
          # Apply Database, Application, Ingress and Monitoring configurations
          kubectl apply -f k8s/db-deployment.yaml
          kubectl apply -f k8s/app-deployment.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/monitoring/

      # ─── Verify Application Rollout ──────────────────────────────
      - name: Verify Rollout Status
        run: |
          kubectl rollout status deployment/travelsphere-app -n travelsphere
