# ============================================================
# TravelSphere — Nginx Reverse Proxy Configuration
# One Next.js process served across three subdomains.
#
# Subdomains:
#   travelsphere.sbs            → Customer portal
#   agent.travelsphere.sbs      → Agent portal
#   admin.travelsphere.sbs      → Admin portal
#
# Prerequisites:
#   1. Install Certbot: sudo apt install certbot python3-certbot-nginx
#   2. Run: sudo certbot --nginx -d travelsphere.sbs \
#             -d agent.travelsphere.sbs -d admin.travelsphere.sbs
#   3. Reload: sudo systemctl reload nginx
# ============================================================

# ------- Redirect HTTP → HTTPS for all three domains --------
server {
  listen 80;
  server_name travelsphere.sbs agent.travelsphere.sbs admin.travelsphere.sbs;
  return 301 https://$host$request_uri;
}

# ------- Customer Portal (travelsphere.sbs) ------------------
server {
  listen 443 ssl http2;
  server_name travelsphere.sbs;

  ssl_certificate     /etc/letsencrypt/live/travelsphere.sbs/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/travelsphere.sbs/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 256;

  location / {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 60s;
    proxy_buffering    off;
  }
}

# ------- Agent Portal (agent.travelsphere.sbs) ---------------
server {
  listen 443 ssl http2;
  server_name agent.travelsphere.sbs;

  ssl_certificate     /etc/letsencrypt/live/travelsphere.sbs/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/travelsphere.sbs/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  location / {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 60s;
    proxy_buffering    off;
  }
}

# ------- Admin Panel (admin.travelsphere.sbs) ----------------
server {
  listen 443 ssl http2;
  server_name admin.travelsphere.sbs;

  ssl_certificate     /etc/letsencrypt/live/travelsphere.sbs/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/travelsphere.sbs/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Extra: block embedding admin in iframes from any domain
  add_header Content-Security-Policy "frame-ancestors 'none';" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  location / {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 60s;
    proxy_buffering    off;
  }
}
