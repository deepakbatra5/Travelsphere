apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travelsphere-ingress
  namespace: travelsphere
  annotations:
    # ─── NGINX Ingress Controller Config (Default) ───────────
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    # ─── AWS ALB Ingress Controller Config (Uncomment to use) ───
    # kubernetes.io/ingress.class: alb
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    # alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
spec:
  rules:
    - host: travelsphere.sbs
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 3000
    - host: agent.travelsphere.sbs
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 3000
    - host: admin.travelsphere.sbs
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 3000
  tls:
    - hosts:
        - travelsphere.sbs
        - agent.travelsphere.sbs
        - admin.travelsphere.sbs
      secretName: travelsphere-tls-secret
