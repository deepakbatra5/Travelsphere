apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: travelsphere
  labels:
    app: travelsphere-app
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: travelsphere-app
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: travelsphere-app
  namespace: travelsphere
  labels:
    app: travelsphere-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: travelsphere-app
  template:
    metadata:
      labels:
        app: travelsphere-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
        - name: app
          image: travelsphere-app:latest # Will be replaced with ECR path in CI/CD pipeline
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/metrics
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/metrics
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            
            # Non-sensitive variables from ConfigMap
            - name: ROOT_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: travelsphere-config
                  key: ROOT_DOMAIN
            - name: NEXT_PUBLIC_ROOT_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: travelsphere-config
                  key: NEXT_PUBLIC_ROOT_DOMAIN
            - name: NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET
              valueFrom:
                configMapKeyRef:
                  name: travelsphere-config
                  key: NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET
            - name: GROQ_MODEL
              valueFrom:
                configMapKeyRef:
                  name: travelsphere-config
                  key: GROQ_MODEL
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: travelsphere-config
                  key: NEXTAUTH_URL
            - name: NEXTAUTH_URL_INTERNAL
              valueFrom:
                configMapKeyRef:
                  name: travelsphere-config
                  key: NEXTAUTH_URL_INTERNAL
            
            # Sensitive variables from Secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: NEXTAUTH_SECRET
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: RAZORPAY_KEY_ID
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: RAZORPAY_KEY_SECRET
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: CLOUDINARY_API_SECRET
            - name: EMAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: EMAIL_HOST
            - name: EMAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: EMAIL_PORT
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: EMAIL_PASS
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: OPENAI_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: travelsphere-secrets
                  key: GROQ_API_KEY
